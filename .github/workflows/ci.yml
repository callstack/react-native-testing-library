name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

# Set minimal permissions by default
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'main')}}

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js and deps
        uses: ./.github/actions/setup-deps

      - name: Lint
        run: yarn lint

      - name: Format
        run: yarn format:check

  typecheck:
    runs-on: ubuntu-latest
    name: Typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js and deps
        uses: ./.github/actions/setup-deps

      - name: Typecheck
        run: yarn typecheck

      - name: Typecheck React 19.2-only tests
        run: yarn typecheck:react-19_2

  docs:
    runs-on: ubuntu-latest
    name: Docs
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js and deps
        uses: ./.github/actions/setup-deps

      - name: Check generated package docs
        run: yarn docs:check

      - name: Setup Node.js and website deps
        uses: ./.github/actions/setup-website-deps

      - name: Validate website docs
        run: yarn --cwd website validate

  typecheck-rn-0-85:
    runs-on: ubuntu-latest
    name: Typecheck → RN 0.85
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js and deps
        uses: ./.github/actions/setup-deps
        with:
          react-version: 19.2.3
          react-native-version: ~0.85.0

      - name: Typecheck
        run: yarn typecheck

      - name: Typecheck React 19.2-only tests
        run: yarn typecheck:react-19_2

  typecheck-rn-0-84:
    runs-on: ubuntu-latest
    name: Typecheck → RN 0.84
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js and deps
        uses: ./.github/actions/setup-deps
        with:
          react-version: 19.2.3
