name: Setup deps (RN nightly)
description: Setup Node.js and install dependencies

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc

    - name: Cache deps
      id: yarn-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ./node_modules
          .yarn/install-state.gz
        key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}-${{ hashFiles('**/package.json', '!node_modules/**') }}
        restore-keys: |
          ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          ${{ runner.os }}-yarn-

    - name: Install deps
      if: steps.yarn-cache.outputs.cache-hit != 'true'
      run: yarn install --immutable
      shell: bash

    - name: Switch to React Native Nightly
      run: |
        yarn add -D \
          react-native@nightly \
          @react-native/babel-preset@nightly \
          @react-native/jest-preset@nightly
        # RN 0.85+ ships the Jest preset as a standalone package, so point the
        # config at it instead of the `react-native`-bundled preset (RN 0.84).
        sed -i "s|preset: 'react-native'|preset: '@react-native/jest-preset'|" jest.config.js
      shell: bash
